<header class="docs-header" aria-label="Documentation header">
  <div class="docs-header__inner">
    <a class="docs-header__brand docs-nav-link" href="/" aria-label="Neuroartan documentation home">
      <img class="docs-header__mark ui-icon-theme-aware" src="/registry/icons/public/assets/core/identity/brand/neuroartan/logo-plain.svg" alt="" aria-hidden="true">
      <span class="docs-header__brand-copy">
        <span class="docs-header__brand-name">Neuroartan</span>
        <span class="docs-header__brand-section">Docs</span>
      </span>
    </a>

    <form class="docs-header__search" role="search" data-docs-search-form>
      <img class="docs-header__search-icon ui-icon-theme-aware" src="/registry/icons/public/assets/core/actions/search/search.svg" alt="" aria-hidden="true">
      <label class="docs-header__search-label" for="docs-global-search">Search documentation</label>
      <input id="docs-global-search" class="docs-header__search-input" type="search" autocomplete="off" placeholder="Search documentation" data-docs-search-input>
      <button class="docs-header__search-clear" type="button" aria-label="Clear search" hidden data-docs-search-clear>
        <img class="docs-header__search-clear-icon ui-icon-theme-aware" src="/registry/icons/public/assets/core/actions/search-clear/search-clear.svg" alt="" aria-hidden="true">
      </button>
    </form>

    <nav class="docs-header__nav" aria-label="Primary documentation" data-docs-header-nav></nav>
  </div>
</header>
